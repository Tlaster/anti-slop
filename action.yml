name: Anti Slop
description:
  Score PR authors for high-volume, template-like contribution patterns
author: Tlaster

branding:
  icon: shield
  color: yellow

inputs:
  github-token:
    description: GitHub token used to query the Search API
    required: false
    default: ''
  fail-on-threshold:
    description:
      Fail the check when the score is greater than or equal to fail-threshold
    required: false
    default: 'false'
  close-pr-on-threshold:
    description:
      Close the pull request when the score is greater than or equal to
      fail-threshold
    required: false
    default: 'false'
  close-linked-author-issues:
    description:
      When closing a PR, also close linked issues opened by the same author
    required: false
    default: 'true'
  fail-threshold:
    description: Score at which the PR is considered high risk
    required: false
    default: '100'
  one-day-window-hours:
    description: Rolling hour window used for the short-term PR volume check
    required: false
    default: '24'
  one-day-pr-threshold:
    description: Add weight-one-day-prs when the author exceeds this PR count
    required: false
    default: '20'
  seven-day-window-days:
    description: Rolling day window used for the broader PR volume check
    required: false
    default: '7'
  seven-day-pr-threshold:
    description: Add weight-seven-day-prs when the author exceeds this PR count
    required: false
    default: '100'
  sample-size:
    description:
      Number of recent PRs to sample for repository spread and body markers
    required: false
    default: '100'
  cross-repo-threshold:
    description:
      Add weight-cross-repo when sampled PRs span more repositories than this
    required: false
    default: '30'
  template-markers:
    description:
      Newline or comma separated body markers that suggest templated/AI
      generated PRs
    required: false
    default: |-
      Made with [Cursor]
      Generated with
      Generated by
  template-marker-ratio-threshold:
    description:
      Add weight-template-markers when this fraction of sampled PRs match
      markers
    required: false
    default: '0.3'
  trusted-author-associations:
    description:
      Comma or newline separated author_association values that should not add
      risk
    required: false
    default: OWNER,MEMBER,COLLABORATOR,CONTRIBUTOR
  prior-merged-pr-threshold:
    description:
      Add weight-no-prior-merged when this repo has fewer merged PRs by the
      author
    required: false
    default: '1'
  weight-one-day-prs:
    description: Score added for short-term PR volume
    required: false
    default: '40'
  weight-seven-day-prs:
    description: Score added for seven-day PR volume
    required: false
    default: '40'
  weight-cross-repo:
    description: Score added for cross-repository spread
    required: false
    default: '30'
  weight-template-markers:
    description: Score added for matching configured body markers
    required: false
    default: '15'
  weight-untrusted-association:
    description: Score added when author_association is not trusted
    required: false
    default: '10'
  weight-no-prior-merged:
    description:
      Score added when the author lacks merged PR history in this repo
    required: false
    default: '20'

outputs:
  score:
    description: Total anti-slop risk score
  risk-level:
    description: low, medium, high, or skipped
  triggered-rules:
    description: Comma separated rule identifiers that contributed to the score
  details:
    description: JSON payload with metrics and triggered rule details
  one-day-pr-count:
    description: Author PR count in the short-term window
  seven-day-pr-count:
    description: Author PR count in the broader window
  unique-repo-count:
    description: Unique repositories in the sampled recent PRs
  template-marker-count:
    description: Number of sampled PRs whose bodies matched configured markers
  prior-merged-pr-count:
    description: Author merged PR count in the current repository
  author-association:
    description: GitHub author_association value from the PR payload
  pr-closed:
    description: Whether this action closed the pull request
  linked-issues-closed:
    description:
      Number of linked same-author issues closed after closing the pull request
  linked-issue-refs:
    description: Comma separated issue references closed by this action

runs:
  using: node24
  main: dist/index.js
